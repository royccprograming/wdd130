<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | White Water Warriors Rafting Company</title>
    <meta name="description"
      content="Experience the ultimate adrenaline rush! Join our white water rafting tours for an unforgettable adventure on the wildest rapids. Book your trip today!">
    <meta name="author" content="Roy Ccanihua">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="white water rafting">
        <nav class="xd">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <h1>White Water Warriors Company</h1>
        <p>123 Main River Street</p>
        <p>Kolob California </p>
        <p>+1 999 999 9999 </p>
        <p>info@whitewater.com</p>
        <div class="container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d48610.81565791196!2d-3.6319141!3d40.40495215!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2ses!4v1775856617814!5m2!1ses!2ses"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="label1">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder=" Placeholder">
                </div>
                <div class="label2">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" placeholder=" Placeholder">
                </div>
                <div class="label3">
                    <label>Message Purpose</label>
                </div>
                <div class="opt1">
                    <input type="radio" id="opt1" name="message">
                    <label for="opt1">General Inquiry</label>
                </div>
                <div class="opt2">
                    <input type="radio" id="opt2" name="message">
                    <label for="opt2">Reservation Question</label>
                </div>
                <div class="opt3">
                    <input type="radio" id="opt3" name="message">
                    <label for="opt3">Website Suggestion</label>
                </div>
                <div class="label7">
                    <label for="text">Message</label>
                    <input type="text" id="text" name="text" placeholder=" Type here">
                </div>
                <div class="label8">
                    <input type="checkbox" id="subscription" name="subscription">
                    <label for="subscription">Please subscribe me to the monthly
                        newsletter</label>
                </div>
                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <section>
            <h2>We Are Here to Serve You</h2>
            <div class="expedition">
                <figure>
                    <img src="images/celebration.jpg" alt="Rafting">
                    <figcaption>Rafting</figcaption>
                </figure>
                <figure>
                    <img src="images/montanas.jpg" alt="Expedition">
                    <figcaption>Expedition</figcaption>
                </figure>
                <figure>
                    <img src="images/paletas.jpg" alt="Force">
                    <figcaption>Force</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©️2026 💦 White Water Warriors 💦 Roy Ccanihua</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon" width="80">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon" width="80">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon" width="80">
            </a>
        </nav>
    </footer>
</body>

</html>
